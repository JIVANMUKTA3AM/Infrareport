version: "3.9"

services:
  gotenberg:
    image: gotenberg/chromium:latest
    container_name: infrareport_gotenberg
    restart: unless-stopped
    # Sem porta exposta externamente — acessado apenas pela API na rede interna

  api:
    build: ./backend
    container_name: infrareport_api
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/storage:/app/storage
    restart: unless-stopped
    depends_on:
      - gotenberg
    ports:
      - "8001:8000"

  frontend:
    build: ./frontend-react
    container_name: infrareport_frontend
    depends_on:
      - api
    ports:
      - "80:80"
    restart: unless-stopped
