<!--
  InfraReport — Fragmento da Página de Propostas
  Injetado dentro de <div id="pagePropostas"> pelo router.
  Depende de: proposals.js, variáveis CSS do dashboard.
-->

<!-- ── KPIs ─────────────────────────────────────────────────────────────── -->
<div class="prop-kpis">
  <div class="prop-kpi">
    <div class="prop-kpi-label">Total do mês</div>
    <div class="prop-kpi-value b" id="pkTotal">—</div>
  </div>
  <div class="prop-kpi">
    <div class="prop-kpi-label">Aprovadas</div>
    <div class="prop-kpi-value g" id="pkAprov">—</div>
  </div>
  <div class="prop-kpi">
    <div class="prop-kpi-label">Pendentes</div>
    <div class="prop-kpi-value o" id="pkPend">—</div>
  </div>
  <div class="prop-kpi">
    <div class="prop-kpi-label">Valor total</div>
    <div class="prop-kpi-value g" id="pkValor" style="font-size:1.1rem">—</div>
  </div>
</div>

<!-- ── CARD PRINCIPAL ────────────────────────────────────────────────────── -->
<div class="prop-table-card">

  <!-- Cabeçalho + Filtros -->
  <div class="prop-list-header">
    <div class="prop-list-title">Propostas Comerciais</div>
    <div class="prop-header-actions">
      <div class="prop-filters">
        <button class="prop-filter-btn active"  onclick="filterProps(this,'todas')">Todas</button>
        <button class="prop-filter-btn"          onclick="filterProps(this,'aprovada')">Aprovadas</button>
        <button class="prop-filter-btn"          onclick="filterProps(this,'pendente')">Pendentes</button>
        <button class="prop-filter-btn"          onclick="filterProps(this,'enviada')">Enviadas</button>
        <button class="prop-filter-btn"          onclick="filterProps(this,'rejeitada')">Rejeitadas</button>
      </div>
      <button class="btn-new-prop" onclick="navigate('chat')">
        + Nova Proposta
      </button>
    </div>
  </div>

  <!-- Tabela (preenchida por proposals.js) -->
  <div id="propTableContainer">
    <!-- Conteúdo injetado por _renderTable() / _renderSkeleton() / _renderError() -->
  </div>

</div>

<style>
